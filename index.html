<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">

  <title>Frontend Mentor | Blog preview card</title>

  <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Figtree:ital,wght@0,300..900;1,300..900&display=swap');

    * {
      padding: 0;
      margin: 0;
      font-family: "Figtree";
    }

    body {
      height: 100vh;
      background-color: hsl(47, 88%, 63%);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }

    .card {
      width: 285px;
      height: 400px;
      background-color: hsl(0, 0%, 100%);
      border-radius: 13px;
      padding: 16px;
      border: 1px solid rgba(47, 46, 46, 0.666);
      box-shadow: 8px 7px;
    }

    .svg {
      width: 285px;
      border-radius: 8px;
    }

    .capsule {
      width: 80px;
      background-color: hsl(47, 88%, 63%);
      color: hsl(0, 0%, 7%);
      border-radius: 4px;
      text-align: center;
      padding: 2px;
      font-size: 14px;
      font-weight: 800;
    }

    .content {
      margin-top: 15px;
    }

    .content :nth-child(2) {
      color: hsl(0, 0%, 7%);
      font-size: 14px;
      font-weight: 500;
      padding-top: 12px;
    }

    .content :nth-child(3) {
      font-size: 18px;
      font-weight: 800;
      padding: 13px 0px;
      transition: 0.2s ease-in-out;
      cursor: pointer;
    }

    .content :nth-child(3):hover {
      color: hsl(47, 88%, 63%);
    }

    .content :nth-child(4) {
      color: hsl(0, 0%, 42%);
      font-size: 14px;
      font-weight: 500;
    }

    .profile {
      color: hsl(0, 0%, 7%);
      display: flex;
      align-items: center;
      margin-top: 25px;
    }

    .profile img {
      width: 30px;
    }

    .profile p {
      font-size: 14px;
      font-weight: 800;
      padding-left: 10px;
    }

    .attribution {
      margin-top: 30px;
      font-size: 0.6875rem;
      text-align: center;
      font-size: 18px;
    }

    .attribution a {
      color: hsl(261, 51%, 42%);
      font-size: 17px;
      font-weight: bold;
      text-decoration: none;
    }

    .attribution a:hover {
      color: hsl(354, 51%, 42%);
    }

  </style>
</head>

<body>
  <div class="card">
    <img class="svg" src="\assets\images\illustration-article.svg" alt="blog card">
    <div class="content">
      <div class="capsule">Learning</div>
      <p>Published 21 Dec 2023</p>
      <p>HTML & CSS foundations</p>
      <p>
        These languages are the backbone of every website, defining structure, content, and presentation.
      </p>
    </div>
    <div class="profile">
      <img src="/assets/images/image-avatar.webp" alt="Greg Hooper">
      <p>Greg Hooper</p>
    </div>
  </div>
  <footer class="attribution">
    <div>
      Challenge by : <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>
    </div>
    <div>
      Coded by : <a href="#">Md. Kudrat Uj Jaman Shourav</a>
    </div>
  </footer>
</body>

</html>
